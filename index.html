<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcademiQ AI — المساعد الأكاديمي الذكي</title>
    <meta name="description" content="مساعد أكاديمي ذكي لقراءة ملفات PDF مع تحليل الذكاء الاصطناعي">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- App Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ══════════════ HEADER ══════════════ -->
    <header class="app-header" id="app-header">
        <div class="header-brand">
            <div class="brand-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                </svg>
            </div>
            <div class="brand-text">
                <h1>AcademiQ AI</h1>
                <span class="brand-subtitle">المساعد الأكاديمي الذكي</span>
            </div>
        </div>

        <div class="header-controls">
            <button class="ctrl-btn" id="mic-btn" title="الأوامر الصوتية">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                    <line x1="12" y1="19" x2="12" y2="23"/>
                    <line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
                <span class="ctrl-label">صوتي</span>
            </button>
            <button class="ctrl-btn" id="sidebar-toggle-btn" title="لوحة التحليل">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <line x1="9" y1="3" x2="9" y2="21"/>
                </svg>
                <span class="ctrl-label">التحليل</span>
            </button>
        </div>
    </header>

    <!-- ══════════════ MAIN LAYOUT ══════════════ -->
    <main class="app-main">

        <!-- ── Analysis Sidebar ── -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>🤖 تحليل الذكاء الاصطناعي</h3>
                <button class="sidebar-close" id="sidebar-close">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="sidebar-content" id="sidebar-content">
                <div class="sidebar-empty">
                    <div class="empty-icon">📊</div>
                    <p>ارفع ملف PDF أو صورة لتحليلها بالكامل</p>
                </div>
            </div>
        </aside>

        <!-- ── Viewer Area ── -->
        <section class="viewer-container" id="viewer-container">

            <!-- Upload Zone (shown when no PDF loaded) -->
            <div class="upload-zone" id="upload-zone">
                <div class="upload-zone-inner" id="upload-zone-inner">
                    <div class="upload-glow"></div>
                    <div class="upload-icon-wrap">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="12" y1="18" x2="12" y2="12"/>
                            <polyline points="9 15 12 12 15 15"/>
                        </svg>
                    </div>
                    <h2>ارفع ملف PDF أو صورة</h2>
                    <p>اسحب وأفلت الملف هنا أو انقر للتصفح</p>
                    <div class="upload-formats">
                        <span class="format-badge">PDF</span>
                        <span class="format-badge">PNG</span>
                        <span class="format-badge">JPG</span>
                        <span class="format-badge">WEBP</span>
                    </div>
                    <input type="file" id="file-input" accept=".pdf,.png,.jpg,.jpeg,.webp" hidden>
                    <button class="upload-browse-btn" id="browse-btn">تصفح الملفات</button>
                </div>
            </div>

            <!-- PDF Viewer (hidden until PDF loaded) -->
            <div class="pdf-viewer" id="pdf-viewer" style="display:none;">
                <!-- PDF Toolbar -->
                <div class="pdf-toolbar" id="pdf-toolbar">
                    <div class="toolbar-group">
                        <button class="tool-btn" id="prev-page" title="الصفحة السابقة">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                        </button>
                        <span class="page-info" id="page-info">1 / 1</span>
                        <button class="tool-btn" id="next-page" title="الصفحة التالية">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                        </button>
                    </div>
                    <div class="toolbar-group">
                        <button class="tool-btn" id="zoom-out" title="تصغير">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                        </button>
                        <span class="zoom-info" id="zoom-info">100%</span>
                        <button class="tool-btn" id="zoom-in" title="تكبير">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                        </button>
                    </div>
                    <div class="toolbar-group">
                        <button class="tool-btn accent" id="analyze-full-btn" title="تحليل كامل بالذكاء الاصطناعي">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                            <span>تحليل كامل</span>
                        </button>
                        <button class="tool-btn" id="new-file-btn" title="ملف جديد">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        </button>
                    </div>
                </div>

                <!-- PDF Page Container -->
                <div class="pdf-pages-wrapper" id="pdf-pages-wrapper">
                    <div class="pdf-page-container" id="pdf-page-container">
                        <!-- Canvas + Text Layer rendered here by pdf-viewer.js -->
                    </div>
                </div>
            </div>

            <!-- Image Viewer (hidden until image loaded) -->
            <div class="image-viewer" id="image-viewer" style="display:none;">
                <div class="image-toolbar">
                    <button class="tool-btn accent" id="analyze-image-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                        <span>تحليل الصورة</span>
                    </button>
                    <button class="tool-btn" id="close-image-btn" title="إغلاق">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div class="image-display">
                    <img id="image-preview" src="" alt="Uploaded image">
                </div>
            </div>
        </section>
    </main>

    <!-- ══════════════ FLOATING AI POPUP ══════════════ -->
    <div class="ai-popup" id="ai-popup">
        <div class="popup-header">
            <div class="popup-title">
                <div class="popup-pulse"></div>
                <span>AcademiQ AI</span>
            </div>
            <div class="popup-actions">
                <button class="popup-action-btn" id="popup-tts" title="استمع للشرح">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                </button>
                <button class="popup-action-btn" id="popup-close" title="إغلاق">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
        </div>
        <div class="popup-body" id="popup-body">
            <div class="popup-loading">
                <div class="dot-loader"><span></span><span></span><span></span></div>
            </div>
        </div>
    </div>

    <!-- ══════════════ VOICE MODAL ══════════════ -->
    <div class="voice-overlay" id="voice-overlay">
        <div class="voice-modal" id="voice-modal">
            <div class="voice-rings">
                <div class="ring ring-1"></div>
                <div class="ring ring-2"></div>
                <div class="ring ring-3"></div>
            </div>
            <div class="voice-mic-icon" id="voice-mic-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                    <line x1="12" y1="19" x2="12" y2="23"/>
                    <line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
            </div>
            <p class="voice-status" id="voice-status">انقر للتحدث...</p>
            <p class="voice-transcript" id="voice-transcript"></p>
            <div class="voice-actions">
                <button class="voice-cancel-btn" id="voice-cancel">إلغاء</button>
                <button class="voice-send-btn" id="voice-send" disabled>إرسال</button>
            </div>
        </div>
    </div>

    <!-- ══════════════ TOAST NOTIFICATIONS ══════════════ -->
    <div class="toast-container" id="toast-container"></div>

    <!-- ══════════════ SCRIPTS (ES Modules) ══════════════ -->
    <script src="popup.js"></script>
    <script src="voice.js"></script>
    <script src="upload.js"></script>
    <script src="sidebar.js"></script>
    <script src="pdf-viewer.js"></script>
    <script src="app.js"></script>
</body>
</html>
